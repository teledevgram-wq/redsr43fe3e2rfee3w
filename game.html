<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME VAULT / игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="#" id="suggestLink">Предложить игру</a>
        </div>
        <div class="user-menu" id="userMenu"></div>
    </nav>

    <main>
        <div id="gameContainer"></div>
        
        <!-- Секция отзывов -->
        <div class="reviews-section" id="reviewsSection">
            <h2 style="margin-bottom: 2rem;">ОТЗЫВЫ</h2>
            
            <!-- Форма добавления отзыва (для авторизованных) -->
            <div id="reviewFormContainer" style="display: none;"></div>
            
            <!-- Список отзывов -->
            <div id="reviewsList"></div>
        </div>
    </main>

    <!-- Модальное окно предложения игры -->
    <div class="modal" id="suggestModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <h2 style="margin-bottom: 1.5rem;">ПРЕДЛОЖИТЬ ИГРУ</h2>
            
            <div class="form-group">
                <label>Steam ID или название игры</label>
                <input type="text" id="suggestGameInput" placeholder="например: 730 или Counter-Strike 2">
            </div>
            
            <div class="form-group">
                <label>Комментарий</label>
                <textarea id="suggestComment" rows="4"></textarea>
            </div>
            
            <button class="btn btn-block" onclick="submitSuggestion()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
