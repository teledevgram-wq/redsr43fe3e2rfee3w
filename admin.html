<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME VAULT / АДМИНКА</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd;
            font-family: inherit;
        }
        .preview { 
            background: #f5f5f5; 
            padding: 20px; 
            margin: 20px 0;
            display: flex;
            gap: 20px;
        }
        .preview img { width: 200px; }
        .games-list { margin-top: 30px; }
        .game-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .btn { 
            background: black; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer;
            margin-right: 10px;
        }
        .btn:hover { opacity: 0.8; }
        .json-output { 
            background: #f5f5f5; 
            padding: 20px; 
            margin-top: 30px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-links"><a href="index.html">ИГРЫ</a></div>
        <div class="user-menu" id="userMenu"></div>
    </nav>

    <main class="container">
        <h1>ПАНЕЛЬ УПРАВЛЕНИЯ</h1>
        
        <!-- Поиск в Steam -->
        <div style="background: #f5f5f5; padding: 20px; margin: 20px 0;">
            <h3>НАЙТИ ИГРУ В STEAM</h3>
            <div class="form-group">
                <label>Steam ID:</label>
                <input type="text" id="steamId" value="730" placeholder="730">
            </div>
            <button class="btn" onclick="findGame()">НАЙТИ</button>
            <div id="loading" style="display: none;">Поиск...</div>
        </div>
        
        <!-- Форма игры (появляется после поиска) -->
        <div id="gameForm" style="display: none;">
            <h3>ДАННЫЕ ИГРЫ</h3>
            
            <div class="preview">
                <img id="previewImage" src="">
                <div>
                    <h3 id="previewName"></h3>
                    <p id="previewPrice"></p>
                </div>
            </div>
            
            <div class="form-group">
                <label>Название:</label>
                <input type="text" id="gameName" readonly>
            </div>
            
            <div class="form-group">
                <label>Описание:</label>
                <textarea id="gameDescription" rows="4" readonly></textarea>
            </div>
            
            <div class="form-group">
                <label>Цена:</label>
                <input type="text" id="gamePrice" readonly>
            </div>
            
            <div class="form-group">
                <label>Ссылка на скачивание:</label>
                <input type="text" id="downloadLink" placeholder="https://cloud.mail.ru/...">
            </div>
            
            <button class="btn" onclick="saveGame()">💾 СОХРАНИТЬ</button>
        </div>
        
        <!-- Список сохраненных игр -->
        <div class="games-list">
            <h3>СОХРАНЕННЫЕ ИГРЫ</h3>
            <div id="gamesList"></div>
        </div>
        
        <!-- JSON для копирования -->
        <div class="json-output">
            <h3>📋 СКОПИРУЙ ЭТОТ JSON:</h3>
            <pre id="jsonOutput">[]</pre>
            <button class="btn" onclick="copyJSON()">КОПИРОВАТЬ</button>
            <p style="color: #666; margin-top: 10px;">1. Скопируй этот JSON<br>2. Открой файл games.json в репозитории<br>3. Вставь вместо старого содержимого<br>4. Сохрани файл</p>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Проверка админа
        const user = checkAuth();
        if (!user || user.username !== '9nge') {
            window.location.href = 'index.html';
        }

        // Загружаем сохраненные игры
        let games = JSON.parse(localStorage.getItem('games') || '[]');
        let currentGame = null;
        
        displayGames();
        updateJSON();
        
        // Поиск игры в Steam
        async function findGame() {
            const steamId = document.getElementById('steamId').value;
            document.getElementById('loading').style.display = 'block';
            
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://store.steampowered.com/api/appdetails?appids=${steamId}&l=russian`)}`);
                const data = await response.json();
                const gameData = JSON.parse(data.contents);
                
                if (gameData[steamId]?.success) {
                    const game = gameData[steamId].data;
                    
                    currentGame = {
                        steam_id: steamId,
                        name: game.name || 'Без названия',
                        description: game.short_description || 'Описание отсутствует',
                        header_image: game.header_image || '',
                        price: game.price_overview?.final_formatted || 'Бесплатно',
                        download_link: '',
                        added: new Date().toISOString()
                    };
                    
                    // Показываем форму
                    document.getElementById('previewImage').src = currentGame.header_image;
                    document.getElementById('previewName').textContent = currentGame.name;
                    document.getElementById('previewPrice').textContent = currentGame.price;
                    document.getElementById('gameName').value = currentGame.name;
                    document.getElementById('gameDescription').value = currentGame.description;
                    document.getElementById('gamePrice').value = currentGame.price;
                    
                    document.getElementById('gameForm').style.display = 'block';
                } else {
                    alert('Игра не найдена');
                }
            } catch (e) {
                alert('Ошибка поиска: ' + e.message);
            }
            
            document.getElementById('loading').style.display = 'none';
        }
        
        // Сохранение игры
        function saveGame() {
            if (!currentGame) return;
            
            // Добавляем ссылку
            currentGame.download_link = document.getElementById('downloadLink').value;
            
            // Проверяем, есть ли уже такая игра
            const index = games.findIndex(g => g.steam_id === currentGame.steam_id);
            if (index >= 0) {
                games[index] = currentGame;
            } else {
                games.push(currentGame);
            }
            
            // Сохраняем в localStorage
            localStorage.setItem('games', JSON.stringify(games));
            
            // Обновляем список и JSON
            displayGames();
            updateJSON();
            
            alert('Игра сохранена! Теперь скопируй JSON и вставь в games.json');
            
            // Очищаем форму
            document.getElementById('gameForm').style.display = 'none';
            document.getElementById('steamId').value = '';
        }
        
        // Отображение списка игр
        function displayGames() {
            const list = document.getElementById('gamesList');
            
            if (games.length === 0) {
                list.innerHTML = '<p>Игр пока нет</p>';
                return;
            }
            
            list.innerHTML = games.map(game => `
                <div class="game-item">
                    <span>${game.name}</span>
                    <span>${game.download_link ? '✅' : '⏳'}</span>
                </div>
            `).join('');
        }
        
        // Обновление JSON для копирования
        function updateJSON() {
            document.getElementById('jsonOutput').textContent = JSON.stringify(games, null, 2);
        }
        
        // Копирование JSON
        function copyJSON() {
            const json = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(json);
            alert('JSON скопирован! Теперь вставь его в файл games.json');
        }
    </script>
</body>
</html>
