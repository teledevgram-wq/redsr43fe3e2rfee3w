<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME VAULT / АДМИНКА</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили как в предыдущей версии */
        .github-setup {
            background: #f5f5f5;
            border: 1px solid #eee;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .token-input {
            font-family: monospace;
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            margin-bottom: 1rem;
        }
        
        .success {
            background: #00ff00;
            color: #000;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .error {
            background: #ff4444;
            color: #fff;
            padding: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-links">
            <a href="index.html">ИГРЫ</a>
            <a href="#" id="suggestLink">ПРЕДЛОЖИТЬ</a>
        </div>
        <div class="user-menu" id="userMenu"></div>
    </nav>

    <main>
        <div class="admin-container">
            <h1 style="margin-bottom: 2rem;">ПАНЕЛЬ УПРАВЛЕНИЯ</h1>
            
            <!-- Настройки GitHub -->
            <div class="github-setup">
                <h2 style="margin-bottom: 1.5rem;">🔧 НАСТРОЙКА GITHUB</h2>
                
                <div style="margin-bottom: 1rem;">
                    <label>GitHub Token:</label>
                    <input type="password" id="githubToken" class="token-input" placeholder="ghp_xxxxxxxxxxxxxxx">
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Имя пользователя:</label>
                    <input type="text" id="githubUsername" class="token-input" placeholder="9nge">
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Название репозитория:</label>
                    <input type="text" id="githubRepo" class="token-input" placeholder="название-репозитория">
                </div>
                
                <button class="btn" onclick="saveGithubConfig()">💾 СОХРАНИТЬ НАСТРОЙКИ</button>
                <button class="btn" onclick="testGithubConnection()">🔄 ТЕСТ ПОДКЛЮЧЕНИЯ</button>
                
                <div id="githubStatus" style="margin-top: 1rem;"></div>
            </div>
            
            <!-- Поиск игры в Steam -->
            <div class="steam-search">
                <h2 style="margin-bottom: 1.5rem;">🔍 НАЙТИ ИГРУ В STEAM</h2>
                
                <div class="form-row">
                    <label>STEAM ID:</label>
                    <input type="text" id="steamId" placeholder="Например: 730 (Counter-Strike 2)">
                </div>
                
                <button class="btn" onclick="searchSteamGame()">НАЙТИ В STEAM</button>
                
                <div class="loading-spinner" id="loading">ПОИСК...</div>
            </div>
            
            <!-- Форма добавления игры -->
            <div id="gameForm" style="display: none;">
                <h2 style="margin-bottom: 1.5rem;">📝 РЕДАКТИРОВАНИЕ ИГРЫ</h2>
                
                <div class="game-preview">
                    <div class="preview-header">
                        <img id="previewImage" src="" alt="Preview">
                        <div>
                            <h3 id="previewName"></h3>
                            <p id="previewPrice" style="color: #666;"></p>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <label>НАЗВАНИЕ:</label>
                        <input type="text" id="gameName" readonly>
                    </div>
                    
                    <div class="form-row">
                        <label>STEAM ID:</label>
                        <input type="text" id="gameSteamId" readonly>
                    </div>
                    
                    <div class="form-row">
                        <label>ОПИСАНИЕ:</label>
                        <textarea id="gameDescription" rows="4" readonly></textarea>
                    </div>
                    
                    <div class="form-row">
                        <label>ЦЕНА:</label>
                        <input type="text" id="gamePrice" readonly>
                    </div>
                    
                    <div class="form-row">
                        <label>ССЫЛКА НА СКАЧИВАНИЕ:</label>
                        <input type="url" id="downloadLink" placeholder="https://cloud.mail.ru/public/...">
                    </div>
                    
                    <button class="btn" onclick="saveGameToGithub()">💾 СОХРАНИТЬ В РЕПОЗИТОРИЙ</button>
                    <button class="btn" onclick="clearForm()">ОЧИСТИТЬ</button>
                </div>
            </div>
            
            <!-- Список игр -->
            <div class="games-list">
                <h2 style="margin-bottom: 1.5rem;">📋 ИГРЫ В РЕПОЗИТОРИИ</h2>
                <div id="gamesList"></div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentGameData = null;
        let githubConfig = null;
        
        // ========== ПРОВЕРКА АДМИНА ==========
        document.addEventListener('DOMContentLoaded', () => {
            const user = checkAuth();
            if (!user || user.username !== '9nge' || user.password !== '56809gghh123') {
                alert('Доступ запрещен!');
                window.location.href = 'index.html';
                return;
            }
            
            // Загружаем сохраненные настройки GitHub
            loadGithubConfig();
            
            // Загружаем игры из репозитория
            loadGamesFromGithub();
        });
        
        // ========== НАСТРОЙКИ GITHUB ==========
        function loadGithubConfig() {
            const saved = localStorage.getItem('github_config');
            if (saved) {
                githubConfig = JSON.parse(saved);
                document.getElementById('githubToken').value = githubConfig.token || '';
                document.getElementById('githubUsername').value = githubConfig.username || '';
                document.getElementById('githubRepo').value = githubConfig.repo || '';
            }
        }
        
        function saveGithubConfig() {
            githubConfig = {
                token: document.getElementById('githubToken').value,
                username: document.getElementById('githubUsername').value,
                repo: document.getElementById('githubRepo').value
            };
            
            localStorage.setItem('github_config', JSON.stringify(githubConfig));
            showStatus('✅ Настройки сохранены', 'success');
        }
        
        async function testGithubConnection() {
            if (!githubConfig?.token || !githubConfig?.username || !githubConfig?.repo) {
                showStatus('❌ Сначала сохраните настройки', 'error');
                return;
            }
            
            try {
                const response = await fetch(`https://api.github.com/repos/${githubConfig.username}/${githubConfig.repo}/contents/`, {
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    showStatus('✅ Подключение к GitHub работает!', 'success');
                } else {
                    showStatus('❌ Ошибка подключения. Проверьте токен и права доступа', 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('githubStatus');
            status.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => {
                status.innerHTML = '';
            }, 5000);
        }
        
        // ========== ЗАГРУЗКА ИГР ИЗ GITHUB ==========
        async function loadGamesFromGithub() {
            if (!githubConfig?.token) {
                console.log('GitHub не настроен');
                return;
            }
            
            try {
                const response = await fetch(`https://api.github.com/repos/${githubConfig.username}/${githubConfig.repo}/contents/games.json`, {
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const content = atob(data.content);
                    const games = JSON.parse(content);
                    displayGames(games);
                } else {
                    console.log('games.json не найден, будет создан');
                    displayGames([]);
                }
            } catch (error) {
                console.error('Ошибка загрузки из GitHub:', error);
            }
        }
        
        function displayGames(games) {
            const list = document.getElementById('gamesList');
            
            if (!games || games.length === 0) {
                list.innerHTML = '<p style="color: #666;">Игр пока нет</p>';
                return;
            }
            
            list.innerHTML = games.map(game => `
                <div class="game-item">
                    <div class="game-info" onclick="editGame('${game.steam_id}')">
                        <img src="${game.header_image || 'https://via.placeholder.com/50'}" alt="">
                        <div>
                            <div style="font-weight: 500;">${game.name}</div>
                            <div style="color: #666; font-size: 0.8rem;">ID: ${game.steam_id}</div>
                        </div>
                    </div>
                    <div>
                        ${game.download_link ? '✅' : '⏳'}
                    </div>
                </div>
            `).join('');
        }
        
        // ========== ПОИСК В STEAM ==========
        async function searchSteamGame() {
            const steamId = document.getElementById('steamId').value.trim();
            
            if (!steamId) {
                alert('Введите Steam ID');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://store.steampowered.com/api/appdetails?appids=${steamId}&l=russian`)}`);
                const data = await response.json();
                const gameData = JSON.parse(data.contents);
                
                if (!gameData[steamId]?.success) {
                    alert('Игра не найдена');
                    document.getElementById('loading').style.display = 'none';
                    return;
                }
                
                const game = gameData[steamId].data;
                
                currentGameData = {
                    steam_id: steamId,
                    name: game.name || 'Без названия',
                    description: game.short_description || 'Описание отсутствует',
                    header_image: game.header_image || '',
                    screenshots: game.screenshots?.map(s => s.path_full) || [],
                    price: game.price_overview?.final_formatted || 'Бесплатно',
                    download_link: '',
                    added: new Date().toISOString()
                };
                
                // Заполняем форму
                document.getElementById('previewImage').src = currentGameData.header_image;
                document.getElementById('previewName').textContent = currentGameData.name;
                document.getElementById('previewPrice').textContent = currentGameData.price;
                document.getElementById('gameName').value = currentGameData.name;
                document.getElementById('gameSteamId').value = currentGameData.steam_id;
                document.getElementById('gameDescription').value = currentGameData.description;
                document.getElementById('gamePrice').value = currentGameData.price;
                
                document.getElementById('gameForm').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                alert('Ошибка: ' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // ========== СОХРАНЕНИЕ В GITHUB ==========
        async function saveGameToGithub() {
            if (!currentGameData) {
                alert('Нет данных для сохранения');
                return;
            }
            
            if (!githubConfig?.token) {
                alert('Сначала настройте GitHub');
                return;
            }
            
            // Добавляем ссылку на скачивание
            currentGameData.download_link = document.getElementById('downloadLink').value;
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                // Получаем текущий файл games.json
                let sha = null;
                let games = [];
                
                const getUrl = `https://api.github.com/repos/${githubConfig.username}/${githubConfig.repo}/contents/games.json`;
                
                const getResponse = await fetch(getUrl, {
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (getResponse.ok) {
                    const fileData = await getResponse.json();
                    sha = fileData.sha;
                    const content = atob(fileData.content);
                    games = JSON.parse(content);
                }
                
                // Проверяем, есть ли уже такая игра
                const existingIndex = games.findIndex(g => g.steam_id === currentGameData.steam_id);
                
                if (existingIndex >= 0) {
                    games[existingIndex] = currentGameData;
                } else {
                    games.push(currentGameData);
                }
                
                // Сохраняем обратно в GitHub
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(games, null, 2))));
                
                const saveResponse = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Add/Update game: ${currentGameData.name}`,
                        content: content,
                        sha: sha
                    })
                });
                
                if (saveResponse.ok) {
                    alert('✅ Игра сохранена в репозиторий!');
                    loadGamesFromGithub(); // Обновляем список
                    clearForm();
                } else {
                    const error = await saveResponse.json();
                    alert('❌ Ошибка сохранения: ' + error.message);
                }
                
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function editGame(steamId) {
            // Загружаем игру для редактирования
            loadGamesFromGithub(); // В реальности нужно загрузить конкретную игру
        }
        
        function clearForm() {
            document.getElementById('steamId').value = '';
            document.getElementById('gameForm').style.display = 'none';
            currentGameData = null;
        }
    </script>
</body>
</html>
